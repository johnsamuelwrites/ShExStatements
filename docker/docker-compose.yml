# ShExStatements Docker Compose Configuration
# For local development and production deployment

version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: shexstatements-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source code for development (remove in production)
      - ../backend/shexstatements:/app/shexstatements:ro
      - ../backend/api:/app/api:ro
      # Mount examples directory
      - ../examples:/app/examples:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - shexstatements-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: shexstatements-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - shexstatements-network

networks:
  shexstatements-network:
    driver: bridge

# Volume for potential future use (e.g., caching, file uploads)
volumes:
  shexstatements-data:
